<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">
  <circle cx="100" cy="100" r="85" fill="#000000" />
  
  <!-- White bars -->
  <rect x="52" y="55" width="14" height="60" fill="#ffffff" />
  <rect x="72" y="40" width="14" height="65" fill="#ffffff" />
  <rect x="92" y="65" width="14" height="60" fill="#ffffff" />
  <rect x="112" y="30" width="14" height="85" fill="#ffffff" />

  <!-- Black cutout line to create the gap -->
  <polyline points="30,120 82,95 82,125 142,80" fill="none" stroke="#000000" stroke-width="14" stroke-linejoin="miter" />
  
  <!-- White arrow line -->
  <polyline points="32,120 82,96 82,121 138,80" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="miter" />
  
  <!-- Arrowhead -->
  <polygon points="132,67 155,70 142,87" fill="#ffffff" />

  <!-- Text -->
  <text x="100" y="215" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" fill="#000000">STOCK</text>
  <text x="100" y="235" font-family="Arial, sans-serif" font-weight="400" font-size="14" letter-spacing="4" text-anchor="middle" fill="#000000">MARKETING</text>
</svg>